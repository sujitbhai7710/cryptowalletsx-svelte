<!doctype html>
<html lang="en">
        <head>
                <meta charset="utf-8" />
                <link rel="icon" href="%sveltekit.assets%/favicon.png" />
                <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
                <meta name="description" content="CryptoWalletsX - Multi-Chain Blockchain Analytics Platform. Track wallet scores, transactions, DeFi activity, and NFTs on Arc Testnet and SimpleChain." />
                <meta name="keywords" content="CryptoWalletsX,cryptowalletsx.com,blockchain,wallet analytics,Arc Testnet,SimpleChain,SRW,USDC,EVM,web3,multi-chain,testnet" />
                <meta name="author" content="CryptoWalletsX" />
                <meta name="theme-color" content="#06b6d4" />
                <meta property="og:site_name" content="CryptoWalletsX" />
                <meta property="og:type" content="website" />
                <meta property="og:url" content="https://cryptowalletsx.com" />
                <title>CryptoWalletsX - Multi-Chain Blockchain Analytics Platform</title>
                <!-- Google Analytics -->
                <script async src="https://www.googletagmanager.com/gtag/js?id=G-CS1FC8P6WF"></script>
                <script>
                        window.dataLayer = window.dataLayer || [];
                        function gtag(){dataLayer.push(arguments);}
                        gtag('js', new Date());
                        gtag('config', 'G-CS1FC8P6WF');
                </script>
                <!-- Google AdSense -->
                <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8421191784631095" crossorigin="anonymous"></script>
                <!-- Prevent flash of wrong theme: apply dark class before rendering -->
                <script>
                        (function() {
                                try {
                                        var theme = localStorage.getItem('theme');
                                        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                                                document.documentElement.classList.add('dark');
                                        }
                                } catch(e) {}
                        })();
                </script>
                %sveltekit.head%
        </head>
        <body data-sveltekit-preload-data="hover" class="antialiased">
                <div style="display: contents">%sveltekit.body%</div>
        </body>
</html>
