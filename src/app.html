<!doctype html>
<html lang="en">
        <head>
                <meta charset="utf-8" />
                <link rel="icon" href="%sveltekit.assets%/favicon.png" />
                <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon.png" />
                <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon.png" />
                <link rel="apple-touch-icon" sizes="180x180" href="%sveltekit.assets%/og-image.png" />
                <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
                <meta name="theme-color" content="#06b6d4" />
                <meta name="color-scheme" content="dark light" />
                <link rel="manifest" href="%sveltekit.assets%/manifest.json" />
                <!-- DNS prefetch for faster external resource loading -->
                <link rel="preconnect" href="https://fonts.googleapis.com" />
                <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
                <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
                <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />
                <link rel="dns-prefetch" href="https://googleads.g.doubleclick.net" />
                <link rel="dns-prefetch" href="https://tpc.googlesyndication.com" />
                <link rel="alternate" type="application/rss+xml" title="CryptoWalletsx Blog" href="/feed.xml" />
                <!-- Prevent flash of wrong theme: apply dark class before rendering -->
                <script>
                        (function() {
                                try {
                                        var theme = localStorage.getItem('theme');
                                        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                                                document.documentElement.classList.add('dark');
                                        }
                                } catch(e) {}
                        })();
                </script>
                %sveltekit.head%
        </head>
        <body data-sveltekit-preload-data="hover" class="antialiased">
                <div style="display: contents">%sveltekit.body%</div>

                <!-- Google Analytics - loaded after content for better performance -->
                <script async src="https://www.googletagmanager.com/gtag/js?id=G-CS1FC8P6WF"></script>
                <script>
                        window.dataLayer = window.dataLayer || [];
                        function gtag(){dataLayer.push(arguments);}

                        // Default consent mode - REQUIRED by Google for GDPR/AdSense compliance
                        // Must be set BEFORE any gtag config or AdSense calls
                        gtag('consent', 'default', {
                                analytics_storage: 'denied',
                                ad_storage: 'denied',
                                ad_user_data: 'denied',
                                ad_personalization: 'denied',
                                wait_for_update: 500
                        });

                        gtag('js', new Date());
                        gtag('config', 'G-CS1FC8P6WF');
                </script>
                <!-- Google AdSense - loaded after content for better performance -->
                <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8421191784631095" crossorigin="anonymous"></script>
        </body>
</html>
